version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mm_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mm_jewellery_db
    ports:
      - "3307:3306"
    volumes:
      - mm-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mm_backend
    restart: always
    ports:
      - "5005:5005"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=mm_jewellery_db;User=root;Password=root_password;
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: mm_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mm-mysql-data:
